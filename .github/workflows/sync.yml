name: Sync Discogs data

on:
  schedule:
    - cron: "0 7 * * *" # daily: collection index + release enrichment + images
    - cron: "0 8 * * 1" # weekly (Monday): marketplace valuations, on top of the daily sync
  workflow_dispatch:
    inputs:
      valuations:
        description: "Also run valuations.ts"
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-discogs-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
      DISCOGS_USERNAME: ${{ vars.DISCOGS_USERNAME }}
      DISCOGS_UA: ${{ vars.DISCOGS_UA }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync collection + wantlist
        run: npm run sync

      - name: Process cover art
        run: npm run images

      - name: Run valuations
        if: github.event.schedule == '0 8 * * 1' || inputs.valuations == true
        run: npm run valuations

      # data/ and public/covers/ ARE the database (see ARCHITECTURE.md) —
      # committing them here is what makes the static build see new data.
      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public/covers
          if git diff --cached --quiet; then
            echo "No changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync Discogs data ($(date -u +%Y-%m-%d))"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with the default GITHUB_TOKEN does NOT trigger other
      # workflows' `on: push` (GitHub blocks that specifically to avoid
      # workflow loops) — so deploy.yml wouldn't otherwise notice this
      # commit. Trigger it explicitly instead.
      - name: Trigger deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY"
